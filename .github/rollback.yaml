name: Rollback

on:
  workflow_dispatch:
    inputs:
      branch:
        required: true
        type: string
      sha:
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        run: npm run deploy:production