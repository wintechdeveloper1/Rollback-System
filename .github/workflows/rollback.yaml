name: Rollback

on:
  workflow_dispatch:
    inputs:
      branch:
        required: true
        type: string
      sha:
        required: true
        type: string

permissions:
  contents: write

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Validate rollback commit
        run: git cat-file -e "${{ inputs.sha }}^{commit}"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Move branch to rollback commit
        run: |
          git reset --hard "${{ inputs.sha }}"
          git push origin "HEAD:${{ inputs.branch }}" --force-with-lease
