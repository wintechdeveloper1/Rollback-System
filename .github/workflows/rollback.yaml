name: Rollback
run-name: Rollback ${{ inputs.branch }} to ${{ inputs.sha }} (${{ inputs.request_id }})

on:
  workflow_dispatch:
    inputs:
      branch:
        required: true
        type: string
      sha:
        required: true
        type: string
      request_id:
        required: true
        type: string

permissions:
  contents: write

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Validate rollback commit
        run: git cat-file -e "${{ inputs.sha }}^{commit}"

      - name: Move workspace to rollback commit
        run: git reset --hard "${{ inputs.sha }}"

      - name: Install dependencies
        run: npm ci

      - name: Build rollback commit
        run: npm run build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Move branch to rollback commit
        run: git push origin "HEAD:${{ inputs.branch }}" --force-with-lease

      - name: Write rollback summary
        run: |
          echo "### Rollback completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Request ID: ${{ inputs.request_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: ${{ inputs.branch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target SHA: ${{ inputs.sha }}" >> "$GITHUB_STEP_SUMMARY"
